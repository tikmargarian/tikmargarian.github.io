<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <title>Test</title>
</head>
<body>
    <div class="container">
        <img src="./image/Brand-name.png" alt="img">
        <form id="main-form">
            <h2>CREATE ACCOUNT</h2>
            <div class="form-content">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Enter your name">
                <i class="icon"></i>
            </div>
            <div class="form-content">
                <label for="surname">Surname</label>
                <input type="text" id="surname" placeholder="Enter your surname">
                <i class="icon"></i>
            </div>
            <div class="form-content">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email adress">
                <i class="icon"></i>
            </div>
            <div class="form-content">
                <label for="phone">Phone</label>
                <input type="text" id="phone" placeholder="Enter your phone number">
                <i class="icon"></i>
            </div>
            <div class="form-content">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password">
                <i class="icon"></i>
            </div>
            <div class="form-content">
                <label for="password">Confirm password</label>
                <input type="password" id="confirm-password" placeholder="Password must be confirmed">
                <i class="icon"></i>
            </div>

            <button type="submit" class="submit-button">SUBMIT</button>
        </form>
    </div>
    <div class="success-popup">
        <div class="success-popup-content">
            <i class="fa fa-check-circle-o"></i>
            <h2>SUCCESS</h2>
            <p>Account created successfully</p>
            <button class="success-close-button">Continue</button>
        </div>
    </div>
    <script src="main.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
</body>
</html>
